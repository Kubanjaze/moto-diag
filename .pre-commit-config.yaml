# Pre-commit hooks for moto-diag.
#
# Phase 191C (2026-05-04): F9 mock-vs-runtime-drift pattern checks
# wired as a local hook. Architect-side opt-in via `pre-commit install`.
# Real CI integration deferred to Phase 204 / Gate 10 (no GitHub Actions
# infrastructure on this repo currently).
#
# Phase 191D (2026-05-04): F20 / F21 generalization. The `--all` flag
# below now also runs `--check-ssot-constants` (TOML-driven SSOT
# literal-pin scan, subsumes the deprecated `--check-model-ids`) +
# `--check-tag-catalog-coverage` (route tags vs TAG_CATALOG diff).
#
# Pattern doc: docs/patterns/f9-mock-vs-runtime-drift.md

repos:
  - repo: local
    hooks:
      - id: f9-pattern-check
        name: F9 mock-vs-runtime-drift pattern check
        entry: python scripts/check_f9_patterns.py --all
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        description: >
          Lint for F9 failure family. Phase 191C: subspecies (ii)
          hardcoded model IDs + (iv) deploy-path missing init_db.
          Phase 191D F20/F21 generalization: --check-ssot-constants
          (TOML-driven, subsumes --check-model-ids) +
          --check-tag-catalog-coverage. See
          docs/patterns/f9-mock-vs-runtime-drift.md.
